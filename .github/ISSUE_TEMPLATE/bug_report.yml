name: Bug Report
description: Report a bug with the Tuya BLE Mesh integration
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before filing
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest version of the integration
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2024.12.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      placeholder: "e.g. 0.35.0"
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: Device Model
      placeholder: "e.g. Malmbergs LED Driver 9952126"
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Device Type
      options:
        - Telink BLE Mesh (LED driver / light)
        - SIG Mesh (Smart Plug S17)
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: |
        Enable debug logging first:
        ```yaml
        logger:
          default: info
          logs:
            custom_components.tuya_ble_mesh: debug
        ```
        Then paste relevant logs here (remove any passwords or keys).
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        If possible, download device diagnostics: Device page → three-dot menu → Download diagnostics.
        Paste the content here (it contains no secrets).
      render: json

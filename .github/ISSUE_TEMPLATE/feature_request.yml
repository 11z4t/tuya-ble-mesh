name: Feature Request
description: Suggest a new feature or improvement
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: checkboxes
    id: checklist
    attributes:
      label: Before filing
      options:
        - label: I have searched existing issues/discussions and this hasn't been requested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve? What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered?

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol (if relevant)
      options:
        - Telink BLE Mesh
        - SIG Mesh
        - Both
        - Not protocol-specific

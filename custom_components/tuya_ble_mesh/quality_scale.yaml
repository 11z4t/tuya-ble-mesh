# Home Assistant Quality Scale
# https://developers.home-assistant.io/docs/integration_quality_scale_index
#
# Tuya BLE Mesh Integration - PLATINUM TIER
# All rules verified as of 2026-03-07 by Thor (VM 903)

rules:
  # ============================================================================
  # BRONZE TIER - Entry Level (22 rules)
  # ============================================================================

  action-setup: done
  # Services registered in __init__.py for device control

  bluetooth-auto-discovery: done
  # BLE mesh devices auto-discovered via scanning (out_of_mesh*, tymesh*)

  common-modules: done
  # Uses homeassistant.helpers for entities, config entries, device registry

  config-flow: done
  # Full config flow in config_flow.py with validation and error handling

  config-flow-test-coverage: done
  # Config flow tests in tests/integration/test_mock_ha_integration.py

  dependency-transparency: done
  # All dependencies declared in manifest.json (bleak, cryptography, aiohttp)

  discovery: done
  # BLE discovery via config flow, auto-detects nearby mesh devices

  docs-actions: done
  # Services documented in README.md (turn on/off, brightness, color temp)

  docs-high-level-description: done
  # README has comprehensive overview of integration architecture and features

  docs-installation-instructions: done
  # README includes HACS and manual installation steps

  docs-removal: done
  # Uninstall instructions in README (remove integration, delete entry)

  entity-event-setup: done
  # Entities emit state change events via HA event bus

  entity-unique-id: done
  # All entities use MAC address-based unique_id for persistence

  has-entity-name: done
  # Entities follow HA naming convention (device name + entity type)

  icon-translations: done
  # Icons defined in strings.json for lights, switches, sensors

  integration-owner: done
  # Codeowner set to @11z4t in manifest.json

  log-when-unavailable: done
  # Coordinator logs connection failures and unavailable states

  test-before-configure: done
  # Config flow validates bridge connectivity before accepting config

  test-before-setup: done
  # Setup validates device reachability before creating entities

  unique-config-entry: done
  # Config flow enforces unique MAC addresses per entry

  # ============================================================================
  # SILVER TIER - Quality (10 rules)
  # ============================================================================

  action-exceptions: done
  # All service calls wrapped in try/except with proper error handling

  config-entry-unloading: done
  # Proper async_unload_entry in __init__.py, cleans up resources

  entity-unavailable: done
  # Entities set to unavailable when bridge/device disconnects

  integrations-file-tests: done
  # Integration tests in tests/integration/ validate HA compatibility

  parallel-updates: done
  # PARALLEL_UPDATES = 1 set in coordinator to prevent race conditions

  reauthentication-flow: done
  # Reauth flow implemented for bridge connection failures

  reauth-issues: done
  # Repair issues created for auth failures with actionable steps

  strict-typing: done
  # Type hints throughout, mypy --strict configuration in pyproject.toml

  test-coverage: done
  # Comprehensive test suite: unit, integration, security, E2E, a11y

  # ============================================================================
  # GOLD TIER - Excellent (9 rules)
  # ============================================================================

  devices: done
  # Device registry integration, devices grouped with entities

  discovery-update-info: done
  # Discovery info updates when device attributes change (RSSI, firmware)

  entity-category: done
  # Diagnostic entities (RSSI sensor) marked with EntityCategory.DIAGNOSTIC

  entity-disabled-by-default: done
  # Diagnostic sensors disabled by default to reduce clutter

  entity-translations: done
  # All entity names, states, attributes translated in strings.json

  exception-translations: done
  # Error messages translated for user-friendly display

  repair-issues: done
  # Repair flow for bridge offline, device unreachable, config errors

  stale-devices: done
  # Coordinator removes stale devices after extended disconnect period

  # ============================================================================
  # PLATINUM TIER - Exceptional (4 rules)
  # ============================================================================

  async-dependency: done
  # Full async/await implementation, uses bleak async BLE library

  inject-websession: done
  # Shared aiohttp.ClientSession via hass.helpers.aiohttp_client

  runtime-data: done
  # Coordinator and devices stored in entry.runtime_data per HA 2024.x pattern

  strict-typing: done
  # mypy --strict passes (see pyproject.toml), full type coverage

# ============================================================================
# ADDITIONAL QUALITY MEASURES (Beyond HA Quality Scale)
# ============================================================================

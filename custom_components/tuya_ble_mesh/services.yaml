identify:
  name: Identify device
  description: >-
    Flash the device LED 3 times to help you locate it in a room.
    Works with all device types that support power toggling.
  fields:
    device_id:
      name: Device
      description: The Tuya BLE Mesh device to identify.
      required: true
      selector:
        device:
          integration: tuya_ble_mesh

set_log_level:
  name: Set log level
  description: >-
    Change BLE mesh logging verbosity without restarting Home Assistant.
    Use "debug" when troubleshooting connectivity, "warning" for daily use.
  fields:
    level:
      name: Level
      description: >-
        debug = all BLE packets and state changes (verbose).
        info = connections and commands.
        warning = problems only (recommended).
        error = critical failures only.
      required: true
      selector:
        select:
          options:
            - debug
            - info
            - warning
            - error

get_diagnostics:
  name: Get diagnostics
  description: >-
    Retrieve connection health, signal strength, response times, and error
    history for a device. Returns structured data that can be used in
    automations or displayed in a template sensor.
  fields:
    device_id:
      name: Device
      description: The Tuya BLE Mesh device to retrieve diagnostics for.
      required: true
      selector:
        device:
          integration: tuya_ble_mesh

reconnect:
  name: Reconnect device
  description: >-
    Force a device to disconnect and reconnect without reloading the
    integration. Useful when a device is stuck in an unresponsive state
    but the integration itself is working fine.
  fields:
    device_id:
      name: Device
      description: The Tuya BLE Mesh device to reconnect.
      required: true
      selector:
        device:
          integration: tuya_ble_mesh

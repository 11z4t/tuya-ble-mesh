name: "Malmbergs LED Driver"
model: "9952126"
category: "dj"
mesh_category: 0x1012  # CW (cool + warm white)
capabilities:
  - power
  - white_brightness
  - white_temperature
data_points:
  1:
    name: "power"
    type: "boolean"
    description: "On/Off"
  3:
    name: "brightness"
    type: "value"
    range: [1, 127]
    description: "White brightness (1-127)"
  4:
    name: "color_temp"
    type: "value"
    range: [0, 127]
    description: "White color temperature (0=warm, 127=cool)"
telink_commands:
  power:
    opcode: 0xD0
    params_on: [0x01]
    params_off: [0x00]
  white_brightness:
    opcode: 0xF1
    param_range: [1, 127]
  white_temperature:
    opcode: 0xF0
    param_range: [0, 127]

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linting tools
        run: pip install --break-system-packages ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --break-system-packages mypy
          pip install --break-system-packages homeassistant-stubs bleak-stubs || true

      - name: MyPy type check
        run: mypy custom_components/tuya_ble_mesh --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --break-system-packages pytest pytest-asyncio pytest-cov
          pip install --break-system-packages bleak bleak-retry-connector cryptography aiohttp pyserial
          pip install --break-system-packages homeassistant || true

      - name: Run unit and security tests
        run: pytest tests/unit tests/security -v --tb=short --timeout=30

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install --break-system-packages detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --exclude-files '(\.git/.*|strings\.json|translations/.*\.json)' > /tmp/secrets-report.json
          detect-secrets audit --report --json /tmp/secrets-report.json || true
          python3 -c "
          import json
          with open('/tmp/secrets-report.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'WARNING: {total} potential secret(s) found')
              for fname, items in results.items():
                  for item in items:
                      print(f'  {fname}:{item[\"line_number\"]} - {item[\"type\"]}')
              exit(1)
          else:
              print('No secrets detected')
          "

  dual-review:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, secrets-scan]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install review dependencies
        run: pip install --break-system-packages httpx

      - name: Dual AI Review (Claude + GPT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO_PATH: ${{ github.workspace }}
        run: python scripts/dual-review.py

  notify:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, secrets-scan, dual-review]
    if: always()
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No SLACK_WEBHOOK_URL secret configured — skipping"
            exit 0
          fi
          STATUS="success"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            STATUS="failure"
          fi
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"CI ${STATUS} for tuya-ble-mesh (${{ github.ref_name }}) - ${STATUS}\"}"

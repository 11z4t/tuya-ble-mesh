name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PIP_BREAK_SYSTEM_PACKAGES: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: Ruff check
        run: python3 -m ruff check .
      - name: Ruff format check
        run: python3 -m ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: MyPy type check
        run: python3 -m mypy custom_components/tuya_ble_mesh --strict --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: Run unit and security tests
        run: python3 -m pytest tests/unit tests/security -v --tb=short --timeout=30

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: Install bandit
        run: pip install bandit
      - name: Bandit security scan
        run: python3 -m bandit -r custom_components/tuya_ble_mesh -ll

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: Scan for secrets
        run: |
          python3 -m detect_secrets scan --all-files --exclude-files "(\.git/.*|strings\.json|translations/.*\.json)" > /tmp/secrets-report.json
          python3 -c "
          import json
          with open('/tmp/secrets-report.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          print(f'Found {total} potential secrets' if total else 'No secrets detected')
          exit(1 if total else 0)
          "

  dual-review:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-scan, secrets-scan]
    if: github.event_name == push
    steps:
      - name: Checkout
        run: |
          git clone https://git.malmgrens.me/${{ github.repository }}.git . 2>/dev/null || git init && git fetch https://git.malmgrens.me/${{ github.repository }}.git ${{ github.sha }} && git checkout FETCH_HEAD
      - name: Dual AI Review (Claude + GPT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO_PATH: ${{ github.workspace }}
        run: python3 scripts/dual-review.py

  notify:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-scan, secrets-scan, dual-review]
    if: always()
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "No webhook" && exit 0
          STATUS="success"
          [ "${{ needs.lint.result }}" \!= "success" ] || [ "${{ needs.test.result }}" \!= "success" ] || [ "${{ needs.secrets-scan.result }}" \!= "success" ] && STATUS="failure"
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"text\":\"CI $STATUS for tuya-ble-mesh (${{ github.ref_name }})\"}" || true
